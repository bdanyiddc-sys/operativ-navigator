services:
  - type: web
    name: operativ-navigator-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/events.db
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
