# Operativ Navigator – egyetlen Netlify projekt, publish = frontend mappa
[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/public/"
  status = 302

[[redirects]]
  from = "/public"
  to = "/public/"
  status = 301

[[redirects]]
  from = "/driver"
  to = "/driver/"
  status = 301

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# API proxy → Render backend (relatív /api/* hívások Netlify-on)
[[redirects]]
  from = "/api/*"
  to = "https://operativ-navigator.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/driver/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/driver/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
