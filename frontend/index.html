<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a237e" />
    <title>Operativ Navigator</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: #e8eef7;
        }
        nav { display: flex; flex-direction: column; gap: 12px; text-align: center; }
        a {
            color: #93c5fd;
            font-size: 1.1rem;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
        }
        a:hover { background: rgba(96,165,250,0.15); }
        h1 { font-size: 1.25rem; margin-bottom: 8px; }
    </style>
    <meta http-equiv="refresh" content="0;url=/public/" />
</head>
<body>
    <nav>
        <h1>Operativ Navigator</h1>
        <a href="/public/">Utas (Public)</a>
        <a href="/driver/">Sofőr (Driver)</a>
        <a href="/admin/">Admin</a>
    </nav>
</body>
</html>
